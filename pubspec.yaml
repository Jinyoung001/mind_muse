name: mind_muse
description: "MindMuse - Android 태블릿 전용 Zero-Chat AI 튜터 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  google_generative_ai: ^0.4.6
  image_picker: ^1.1.2
  flutter_dotenv: ^5.2.1
  flutter_inappwebview: ^6.1.5
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
