name: mind_muse
description: "MindMuse - Android 태블릿 전용 Zero-Chat AI 튜터 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  image_picker: ^1.1.2
  flutter_dotenv: ^5.2.1
  flutter_inappwebview: ^6.1.5
  dio: ^5.7.0
  google_fonts: ^6.2.1
  aurora_background: ^0.0.1
  rive: ^0.13.0
  animated_text_kit: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/animations/
